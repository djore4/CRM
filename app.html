<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Sales Drive CRM - Protótipo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .bmw-blue { color: #1C69D2; }
        .bg-bmw-blue { background-color: #1C69D2; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; }
        .nav-blur { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-20">

    <!-- HEADER / SUPERVISÃO -->
    <div class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div>
            <h1 class="text-xs uppercase tracking-widest text-gray-500">Sales Manager View</h1>
            <p class="text-xl font-semibold">Stand Lisboa Centro</p>
        </div>
        <div class="text-right">
            <span class="text-bmw-blue font-bold text-xl">84%</span>
            <p class="text-[10px] text-gray-400">Objetivo Mensal</p>
        </div>
    </div>

    <!-- DASHBOARD "O MEU DIA" -->
    <div id="home" class="p-6 space-y-6">
        <section>
            <h2 class="text-sm font-semibold mb-4 flex items-center">
                <span class="w-2 h-2 bg-bmw-blue rounded-full mr-2"></span> O MEU DIA (Outlook Sync)
            </h2>
            <div class="card p-4 mb-3 flex justify-between items-center border-l-4 border-bmw-blue">
                <div>
                    <p class="text-xs text-gray-400">10:30 — Test-Drive</p>
                    <p class="font-medium">João Oliveira - BMW i4</p>
                </div>
                <button onclick="alert('A abrir detalhes do Outlook...')" class="text-xs bg-gray-800 px-3 py-1 rounded">Ver Mail</button>
            </div>
            <div class="card p-4 flex justify-between items-center opacity-60">
                <div>
                    <p class="text-xs text-gray-400">14:00 — Entrega</p>
                    <p class="font-medium">Sónia Matos - X5 xDrive</p>
                </div>
                <span class="text-xs text-green-500">Confirmado</span>
            </div>
        </section>

        <!-- PIPELINE SIMPLIFICADO -->
        <section>
            <h2 class="text-sm font-semibold mb-4">NEGÓCIOS QUENTES</h2>
            <div class="space-y-3">
                <div class="card p-4">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-bmw-blue">SÉRIE 3 SEDAN</span>
                        <span class="text-xs text-gray-500">Há 2 horas</span>
                    </div>
                    <p class="font-semibold text-lg">Ricardo Pereira</p>
                    <div class="flex mt-3 space-x-2">
                        <button onclick="alert('A ligar...')" class="flex-1 bg-white text-black text-xs py-2 rounded-md font-bold">LIGAR</button>
                        <button onclick="alert('Template BMW enviado por WhatsApp')" class="flex-1 bg-gray-800 text-xs py-2 rounded-md">WHATSAPP</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
    <nav class="fixed bottom-0 w-full nav-blur border-t border-gray-800 flex justify-around p-4">
        <button class="flex flex-col items-center bmw-blue">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] mt-1">Cockpit</span>
        </button>
        <button onclick="alert('Pipeline em modo Kanban')" class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] mt-1">Negócios</span>
        </button>
        <button onclick="alert('Scan de Documentos/CC')" class="flex flex-col items-center text-gray-500">
            <div class="bg-bmw-blue p-2 rounded-full -mt-8 shadow-lg border-4 border-black">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="text-[10px] mt-1">Nova Lead</span>
        </button>
        <button onclick="alert('Calendário Outlook')" class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] mt-1">Agenda</span>
        </button>
        <button onclick="alert('Modo Supervisor: Ranking da Equipa')" class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"></path></svg>
            <span class="text-[10px] mt-1">Equipa</span>
        </button>
    </nav>
</body>
</html>
